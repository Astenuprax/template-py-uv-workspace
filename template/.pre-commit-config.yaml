# Local commit gate (base layer + python uv-workspace stack). Mirror in CI
# (.github/workflows/ci.yml) — the hook is the fast local dam, CI is the backstop the hook can't
# be --no-verify'd past. Activate once per clone:  uvx pre-commit install
# Hook repos are pinned to readable version tags (NOT SHA) by deliberate decision — see docs/adr.
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Universal governance checks (base layer; language-agnostic; pure stdlib + PyYAML). Runs once
  # over the whole tree, not per-file, so it can reason about layout (root-MD allowlist, docs
  # frontmatter) and supply-chain (Actions SHA-pinning) holistically. `language: python` lets
  # pre-commit provision the interpreter — no reliance on a bare `python` being on PATH.
  - repo: local
    hooks:
      - id: governance-checks
        name: universal governance checks (SHA-pin, license, MD-allowlist, frontmatter)
        entry: python tools/governance_checks.py
        language: python
        additional_dependencies: ["pyyaml==6.0.2"]  # workflows are PARSED, not regexed (leaky)
        pass_filenames: false
        always_run: true

  # --- python uv-workspace stack hooks (appended on top of the base layer) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type-check and the structure gate run in the workspace venv (need resolved imports),
  # so they are local hooks shelling out to `uv run` rather than isolated pre-commit envs.
  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict, workspace venv)
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: structure-lint
        name: structure-lint gate (G1)
        entry: uv run pytest tests/test_structure.py -q
        language: system
        pass_filenames: false
        always_run: true
